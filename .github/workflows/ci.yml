name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    tags: [ "v*" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64

      - name: Build and test examples
        run: |
          docker build -t hebrew-md-book:test .

          # Loop over all example directories under examples/
          for dir in examples/*; do
            if [ -d "$dir" ]; then
              name="$(basename "$dir")"
              out_dir="out_${name}"
              echo "==> Testing example: $name"
              mkdir -p "$out_dir"
              docker run --rm \
                -v "$PWD/$dir:/in" \
                -v "$PWD/$out_dir:/out" \
                hebrew-md-book:test \
                build
              test -s "$out_dir/book.epub"
              test -s "$out_dir/book.pdf"
            fi
          done

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/exital/hebrew-md-book
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest

